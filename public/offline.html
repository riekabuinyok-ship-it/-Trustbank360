<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0F4C81" />
  <title>You're Offline | TrustBank360</title>
  <link rel="icon" href="/images/icons/icon-192.png" />
  <style>
    :root {
      --primary: #0F4C81;
      --secondary: #00A86B;
      --bg: #f8fafc;
      --bg-dark: #0F0F1A;
      --text: #1e293b;
      --text-muted: #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 480px;
      width: 100%;
      background: #ffffff;
      border-radius: 16px;
      padding: 40px 32px;
      box-shadow: 0 10px 30px rgba(15, 76, 129, 0.08);
      text-align: center;
    }
    .icon-wrap {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: rgba(15, 76, 129, 0.08);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-wrap svg { width: 40px; height: 40px; color: var(--primary); }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
    p.subtitle { color: var(--text-muted); margin-bottom: 24px; font-size: 15px; line-height: 1.5; }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      background: #fef3c7;
      color: #92400e;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .status::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f59e0b;
    }
    .actions { display: flex; flex-direction: column; gap: 10px; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
    }
    .btn-primary {
      background: var(--primary);
      color: #ffffff;
    }
    .btn-primary:hover { background: #0d3f6e; }
    .btn-secondary {
      background: #f1f5f9;
      color: var(--text);
    }
    .btn-secondary:hover { background: #e2e8f0; }
    .cached {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid #e2e8f0;
    }
    .cached-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 12px;
      font-weight: 600;
    }
    .cached a {
      display: inline-block;
      padding: 6px 12px;
      margin: 4px;
      background: #f1f5f9;
      color: var(--text);
      border-radius: 6px;
      text-decoration: none;
      font-size: 13px;
      transition: background 0.15s;
    }
    .cached a:hover { background: #e2e8f0; }
    .footer {
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
    }
    @media (prefers-color-scheme: dark) {
      body { background: var(--bg-dark); color: #e2e8f0; }
      .card { background: #1e293b; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
      h1 { color: #f1f5f9; }
      p.subtitle { color: #94a3b8; }
      .btn-secondary { background: #334155; color: #e2e8f0; }
      .btn-secondary:hover { background: #475569; }
      .cached { border-top-color: #334155; }
      .cached a { background: #334155; color: #e2e8f0; }
      .cached a:hover { background: #475569; }
      .footer { color: #94a3b8; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M18.364 5.636a9 9 0 010 12.728M5.636 18.364a9 9 0 010-12.728M12 8v4m0 4h.01" />
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p class="subtitle">It looks like you've lost your internet connection. Some features may be unavailable until you're back online.</p>
    <div class="status">No Internet Connection</div>
    <div class="actions">
      <button class="btn btn-primary" onclick="location.reload()">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
        </svg>
        Try Again
      </button>
      <a href="/login" class="btn btn-secondary">Go to Login</a>
    </div>
    <div class="cached">
      <p class="cached-label">Available Offline (Cached)</p>
      <a href="/">Home</a>
      <a href="/login">Login</a>
      <a href="/features">Features</a>
      <a href="/help">Help</a>
      <a href="/track">Track Transfer</a>
    </div>
    <p class="footer">TrustBank360 — Your data syncs automatically when you reconnect.</p>
  </div>
  <script>
    // Auto-reload when back online
    window.addEventListener("online", () => { location.reload(); });
    // Show the cached timestamp
    try {
      const cachedAt = new Date();
      console.log("[offline.html] Loaded at", cachedAt.toISOString());
    } catch (e) { /* noop */ }
  </script>
</body>
</html>
